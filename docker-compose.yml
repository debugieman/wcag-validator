services:
  backend:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    ports:
      - "5042:8080"
    volumes:
      - db-data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/wcag-analyzer.db
      - App__BaseUrl=${App__BaseUrl:-http://localhost:4200}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
