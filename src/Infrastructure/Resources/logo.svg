<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 70" role="img" aria-label="WCAG Analyzer">
  <title>WCAG Analyzer</title>

  <!-- WCAG — dominant wordmark -->
  <text
    x="1" y="51"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-size="50"
    fill="#1A237E"
    letter-spacing="-1">WCAG</text>

  <!-- Green accent bar — accessibility = pass -->
  <rect x="1" y="55" width="150" height="3" rx="1.5" fill="#388E3C"/>

  <!-- ANALYZER — wide-tracked subtitle -->
  <text
    x="3" y="67"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="11"
    fill="#546E7A"
    letter-spacing="5.5">ANALYZER</text>
</svg>
