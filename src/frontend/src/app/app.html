<main class="main">
  <div class="container">
    <h1>WCAG Analyzer</h1>
    <p class="subtitle">Check your website for accessibility issues</p>

    <input
      class="email-field"
      type="email"
      placeholder="your@email.com"
      [value]="email()"
      (input)="email.set($any($event.target).value)"
      (keydown.enter)="onAnalyze()"
    />

    <div class="url-form">
      <input
        type="url"
        placeholder="https://example.com"
        [value]="url()"
        (input)="url.set($any($event.target).value)"
        (keydown.enter)="onAnalyze()"
      />
      <button (click)="onAnalyze()" [disabled]="isLoading() || !isFormReady()">
        {{ isLoading() ? 'Analyzing...' : 'Analyze' }}
      </button>
    </div>

    <div class="scan-mode">
      <label class="scan-option" [class.selected]="scanMode() === 'quick'">
        <input type="radio" name="scanMode" value="quick"
               [checked]="scanMode() === 'quick'"
               (change)="scanMode.set('quick')" />
        <div class="scan-option-content">
          <span class="scan-option-title">Quick Check</span>
          <span class="scan-option-desc">One page, instant results</span>
        </div>
      </label>

      <label class="scan-option" [class.selected]="scanMode() === 'deep'">
        <input type="radio" name="scanMode" value="deep"
               [checked]="scanMode() === 'deep'"
               (change)="scanMode.set('deep')" />
        <div class="scan-option-content">
          <span class="scan-option-title">Deep Scan</span>
          <span class="scan-option-desc">Main page + up to 5 subpages</span>
        </div>
      </label>
    </div>

    @if (message()) {
      <p class="message" [class.error]="messageType() === 'error'">{{ message() }}</p>
    }

    @if (analysisId()) {
      <p><a href="https://localhost:7268/api/analysis/{{ analysisId() }}/report" target="_blank">Download PDF report (dev)</a></p>
    }
  </div>
</main>

<router-outlet />
